<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Care — Consommation médicale éthique</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            blob: "blob 7s infinite",
          },
          keyframes: {
            blob: {
              "0%": { transform: "translate(0px, 0px) scale(1)" },
              "33%": { transform: "translate(30px, -50px) scale(1.1)" },
              "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
              "100%": { transform: "translate(0px, 0px) scale(1)" },
            },
          },
        },
      },
    };
  </script>
  <style>
    /* ─── Global transitions ─────────────────────────────── */
    #app { transition: opacity 0.12s ease; }

    /* ─── Custom components ──────────────────────────────── */
    .card {
      @apply bg-white rounded-2xl border border-gray-100 shadow-sm;
    }
    .btn-primary {
      @apply bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800
             text-white font-semibold rounded-xl transition-all duration-150
             inline-flex items-center justify-center;
    }
    .btn-ghost {
      @apply border border-gray-200 hover:border-emerald-300 hover:bg-emerald-50
             text-gray-700 hover:text-emerald-700 font-medium rounded-xl
             transition-all duration-150 inline-flex items-center justify-center;
    }
    .input {
      @apply w-full border border-gray-200 rounded-xl px-4 py-3 text-sm
             focus:outline-none focus:ring-2 focus:ring-emerald-300 focus:border-emerald-400
             bg-white transition-all;
    }
    .label {
      @apply block text-sm font-medium text-gray-700 mb-1.5;
    }
    .nav-link {
      @apply text-sm text-gray-500 hover:text-emerald-600 px-3 py-1.5 rounded-lg
             hover:bg-emerald-50 transition-all font-medium;
    }
    .section-title {
      @apply text-base font-semibold text-gray-900;
    }
    .tag {
      @apply bg-emerald-50 text-emerald-700 text-xs font-medium px-2.5 py-1 rounded-full;
    }
    .chip {
      @apply bg-gray-100 hover:bg-emerald-100 hover:text-emerald-700 text-gray-600
             text-xs font-medium px-3 py-1.5 rounded-full transition cursor-pointer border border-transparent
             hover:border-emerald-200;
    }

    /* ─── Auth tabs ──────────────────────────────────────── */
    .tab-btn {
      @apply transition-all font-medium text-sm py-3.5 text-gray-400 hover:text-gray-700 cursor-pointer;
    }
    .tab-active {
      @apply text-emerald-700 border-b-2 border-emerald-500 !important;
    }

    /* ─── Filter chips ───────────────────────────────────── */
    .filter-active {
      @apply bg-emerald-600 text-white border-emerald-600 !important;
    }

    /* ─── AI spinner ─────────────────────────────────────── */
    .ai-spinner {
      @apply w-5 h-5 rounded-full border-2 border-teal-300 border-t-teal-600;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Blob animation delay ───────────────────────────── */
    .animation-delay-2000 { animation-delay: 2s; }

    /* ─── Scrollbar ──────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f9fafb; }
    ::-webkit-scrollbar-thumb { background: #d1fae5; border-radius: 9999px; }
    ::-webkit-scrollbar-thumb:hover { background: #6ee7b7; }
  </style>
</head>
<body class="antialiased text-gray-900 bg-gray-50">
  <div id="app" style="opacity:1"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
